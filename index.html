<!doctype html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Àpatrack</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #f6f5f1;
    --card: #ffffff;
    --ink: #2b2a27;
    --muted: #6b6a66;
    --accent: #2f6f4f;
    --accent-light: #e7f2ec;
    --danger: #a4453b;
    --border: #e4e2dc;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 80px; }
  header.app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  header.app-header h1 { font-size: 1.3rem; margin: 0; letter-spacing: -0.01em; }
  header.app-header .user-email { font-size: 0.78rem; color: var(--muted); }
  button {
    font: inherit; cursor: pointer; border: none; border-radius: 10px;
    padding: 10px 16px; background: var(--accent); color: #fff; transition: opacity .15s;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  button.danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 16px;
  }
  .card h2 { font-size: 0.95rem; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: var(--muted); }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    font: inherit; background: #fdfdfc; margin-bottom: 14px;
  }
  textarea { resize: vertical; min-height: 50px; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  .fasting-chart-svg { width: 100%; height: auto; display: block; }
  .fasting-chart-svg .bar { fill: var(--accent); }
  .fasting-chart-svg .bar.empty-bar { fill: var(--border); }
  .fasting-chart-svg .axis-label { fill: var(--muted); font-size: 9px; font-family: inherit; }
  .fasting-chart-svg .value-label { fill: var(--ink); font-size: 10px; font-family: inherit; font-weight: 600; }
  .fasting-chart-svg .goal-line { stroke: var(--muted); stroke-dasharray: 3 3; stroke-width: 1; }
  .fasting-chart-svg .goal-label { fill: var(--muted); font-size: 8px; font-family: inherit; }
  .entry {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px;
  }
  .entry:last-child { border-bottom: none; }
  .entry .meta { font-size: 0.78rem; color: var(--muted); }
  .entry .desc { font-size: 0.92rem; margin-top: 2px; }
  .pill {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; white-space: nowrap;
  }
  .pill.mt-esmorzar { background: #fef3c7; color: #92600e; }
  .pill.mt-mig_mati { background: #ffe4d5; color: #9a4a1f; }
  .pill.mt-dinar { background: #dcf5e3; color: #1f7a41; }
  .pill.mt-berenar { background: #fde2e7; color: #a23b56; }
  .pill.mt-sopar { background: #e0e7ff; color: #3b4bab; }
  .pill.mt-altre { background: #ececec; color: #55565a; }
  .nutri-info { font-size: 0.76rem; color: var(--muted); margin-top: 3px; }
  .del-btn { background: none; border: none; color: var(--muted); font-size: 0.9rem; padding: 2px 6px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; }
  .stats-grid .stat { background: #fafaf7; border-radius: 10px; padding: 10px 4px; }
  .stats-grid .stat .n { font-size: 1.2rem; font-weight: 600; }
  .stats-grid .stat .l { font-size: 0.68rem; color: var(--muted); }
  #login-view { max-width: 380px; margin: 15vh auto 0; text-align: center; }
  #login-view h1 { margin-bottom: 6px; }
  #login-view p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
  #login-msg { margin-top: 12px; font-size: 0.85rem; color: var(--accent); min-height: 1.2em; }
  .hidden { display: none !important; }
  .empty { color: var(--muted); font-size: 0.88rem; text-align: center; padding: 20px 0; }
</style>
</head>
<body>

<div id="login-view" class="wrap">
  <h1>Àpatrack</h1>
  <p>Registra els teus àpats i sabrem què millorar.</p>
  <div class="card" style="text-align:left">
    <label for="email">Correu electrònic</label>
    <input type="email" id="email" placeholder="tu@exemple.com" autocomplete="email" />
    <button id="send-link" style="width:100%">Envia'm l'enllaç d'accés</button>
    <div id="login-msg"></div>
  </div>
</div>

<div id="app-view" class="wrap hidden">
  <header class="app-header">
    <div>
      <h1>Àpatrack</h1>
      <div class="user-email" id="user-email"></div>
    </div>
    <button class="secondary" id="logout-btn">Tanca sessió</button>
  </header>

  <div class="card">
    <h2>Registra un àpat</h2>
    <label for="meal-type">Tipus</label>
    <select id="meal-type">
      <option value="esmorzar">Esmorzar</option>
      <option value="mig_mati">Mig matí</option>
      <option value="dinar">Dinar</option>
      <option value="berenar">Berenar</option>
      <option value="sopar">Sopar</option>
      <option value="altre">Altre</option>
    </select>
    <div class="row">
      <div>
        <label for="meal-date">Data</label>
        <input type="date" id="meal-date" />
      </div>
      <div>
        <label for="meal-time">Hora</label>
        <input type="time" id="meal-time" />
      </div>
    </div>
    <label for="description">Què has menjat</label>
    <textarea id="description" placeholder="p. ex. amanida, arròs amb pollastre..."></textarea>
    <label for="notes">Notes (opcional)</label>
    <textarea id="notes" placeholder="gana, estat d'ànim, context..."></textarea>
    <div class="row">
      <div>
        <label for="calories">Calories aprox. (opcional)</label>
        <input type="number" id="calories" min="0" step="1" placeholder="p. ex. 450" />
      </div>
      <div>
        <label for="nutrition">Puntuació nutricional 1-10 (opcional)</label>
        <input type="number" id="nutrition" min="1" max="10" step="1" placeholder="p. ex. 7" />
      </div>
    </div>
    <button id="save-btn" style="width:100%">Desa el registre</button>
  </div>

  <div class="card">
    <h2>Últims 7 dies</h2>
    <div class="stats-grid" id="stats-grid">
      <div class="stat"><div class="n">–</div><div class="l">àpats</div></div>
      <div class="stat"><div class="n">–</div><div class="l">dies actius</div></div>
      <div class="stat"><div class="n">–</div><div class="l">dejuni mitjà</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Dejuni: sopar → esmorzar</h2>
    <div id="fasting-chart"><div class="empty">Carregant...</div></div>
  </div>

  <div class="card">
    <h2>Registres recents</h2>
    <div id="entries-list"><div class="empty">Carregant...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nrhlfdcorynntnizymdk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yaGxmZGNvcnlubnRuaXp5bWRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MzkyODIsImV4cCI6MjEwMDExNTI4Mn0.M8gOiLtvSeDIrWkcq32W0E675STIMJKtWxr7zMvU6HQ';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

const loginView = document.getElementById('login-view');
const appView = document.getElementById('app-view');
const loginMsg = document.getElementById('login-msg');

function setMealFieldsToNow() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('meal-date').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('meal-time').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

document.getElementById('send-link').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) { loginMsg.textContent = 'Escriu un correu vàlid.'; return; }
  loginMsg.style.color = 'var(--muted)';
  loginMsg.textContent = 'Enviant...';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: {
      shouldCreateUser: false,
      emailRedirectTo: window.location.origin + window.location.pathname
    }
  });
  if (error) {
    loginMsg.style.color = 'var(--danger)';
    loginMsg.textContent = 'Error: ' + error.message;
  } else {
    loginMsg.style.color = 'var(--accent)';
    loginMsg.textContent = 'Revisa el teu correu i clica l\'enllaç per entrar.';
  }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
});

document.getElementById('save-btn').addEventListener('click', async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  const mealType = document.getElementById('meal-type').value;
  const mealDateInput = document.getElementById('meal-date').value;
  const mealTimeInput = document.getElementById('meal-time').value;
  const description = document.getElementById('description').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const caloriesInput = document.getElementById('calories').value;
  const nutritionInput = document.getElementById('nutrition').value;
  const mealTime = (mealDateInput && mealTimeInput)
    ? new Date(`${mealDateInput}T${mealTimeInput}`).toISOString()
    : new Date().toISOString();

  const { error } = await sb.from('meal_logs').insert({
    user_id: user.id,
    meal_time: mealTime,
    meal_type: mealType,
    description: description || null,
    notes: notes || null,
    calories_approx: caloriesInput ? parseInt(caloriesInput, 10) : null,
    nutrition_score: nutritionInput ? parseInt(nutritionInput, 10) : null
  });

  if (error) {
    alert('Error desant: ' + error.message);
    return;
  }
  document.getElementById('description').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('calories').value = '';
  document.getElementById('nutrition').value = '';
  setMealFieldsToNow();
  loadEntries();
  loadStats();
  loadFasting();
});

async function loadEntries() {
  const list = document.getElementById('entries-list');
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  const { data, error } = await sb
    .from('meal_logs')
    .select('*')
    .eq('user_id', user.id)
    .order('meal_time', { ascending: false })
    .limit(20);

  if (error) { list.innerHTML = `<div class="empty">Error: ${error.message}</div>`; return; }
  if (!data.length) { list.innerHTML = '<div class="empty">Encara no hi ha registres.</div>'; return; }

  list.innerHTML = data.map(row => {
    const d = new Date(row.meal_time);
    const dateStr = d.toLocaleDateString('ca-ES', { day: '2-digit', month: '2-digit' });
    const timeStr = d.toLocaleTimeString('ca-ES', { hour: '2-digit', minute: '2-digit' });
    const nutriParts = [];
    if (row.calories_approx !== null && row.calories_approx !== undefined) nutriParts.push(`${row.calories_approx} kcal`);
    if (row.nutrition_score !== null && row.nutrition_score !== undefined) nutriParts.push(`nutrició ${row.nutrition_score}/10`);
    const nutriLine = nutriParts.length ? `<div class="nutri-info">${nutriParts.join(' · ')}</div>` : '';
    return `
      <div class="entry" data-id="${row.id}">
        <div>
          <div class="meta">${dateStr} · ${timeStr}</div>
          <div class="desc">${row.description ? escapeHtml(row.description) : '<em>(sense descripció)</em>'}</div>
          ${nutriLine}
        </div>
        <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
          <span class="pill mt-${row.meal_type}">${row.meal_type.replace('_',' ')}</span>
          <button class="del-btn" onclick="deleteEntry('${row.id}')">Esborra</button>
        </div>
      </div>`;
  }).join('');
}

async function deleteEntry(id) {
  if (!confirm('Esborrar aquest registre?')) return;
  const { error } = await sb.from('meal_logs').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  loadEntries();
  loadStats();
  loadFasting();
}
window.deleteEntry = deleteEntry;

async function loadStats() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  const since = new Date();
  since.setDate(since.getDate() - 6);
  const sinceStr = since.toISOString().slice(0, 10);

  const { data, error } = await sb
    .from('meal_stats_daily')
    .select('*')
    .eq('user_id', user.id)
    .gte('day', sinceStr);

  const grid = document.getElementById('stats-grid');
  if (error || !data) { return; }
  const totalApats = data.reduce((s, r) => s + (r.total_apats || 0), 0);
  const diesActius = data.length;

  const { data: fastData } = await sb
    .from('fasting_windows')
    .select('fasting_hours')
    .eq('user_id', user.id)
    .gte('sopar_day', sinceStr);

  let mitjana = '–';
  if (fastData && fastData.length) {
    const avg = fastData.reduce((s, r) => s + Number(r.fasting_hours), 0) / fastData.length;
    mitjana = avg.toFixed(1) + 'h';
  }

  grid.innerHTML = `
    <div class="stat"><div class="n">${totalApats}</div><div class="l">àpats</div></div>
    <div class="stat"><div class="n">${diesActius}</div><div class="l">dies actius</div></div>
    <div class="stat"><div class="n">${mitjana}</div><div class="l">dejuni mitjà</div></div>`;
}

async function loadFasting() {
  const container = document.getElementById('fasting-chart');
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  const sinceStr = days[0];

  const { data, error } = await sb
    .from('fasting_windows')
    .select('sopar_day, fasting_hours')
    .eq('user_id', user.id)
    .gte('sopar_day', sinceStr)
    .order('sopar_day', { ascending: true });

  if (error) { container.innerHTML = `<div class="empty">Error: ${error.message}</div>`; return; }

  // Si un dia té més d'un registre de dejuni, ens quedem amb la mitjana
  const byDay = {};
  (data || []).forEach(r => {
    const key = r.sopar_day;
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(Number(r.fasting_hours));
  });

  const values = days.map(day => {
    const arr = byDay[day];
    if (!arr || !arr.length) return null;
    return arr.reduce((a, b) => a + b, 0) / arr.length;
  });

  if (values.every(v => v === null)) {
    container.innerHTML = '<div class="empty">Encara no hi ha prou dades (calen un sopar i un esmorzar registrats seguits).</div>';
    return;
  }

  container.innerHTML = renderFastingChart(days, values);
}

function renderFastingChart(days, values) {
  const w = 320, h = 130;
  const padLeft = 4, padRight = 4, padTop = 18, padBottom = 18;
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;
  const n = days.length;
  const gap = 8;
  const barW = (chartW - gap * (n - 1)) / n;
  const maxVal = Math.max(16, ...values.filter(v => v !== null));
  const goalHours = 12;

  const goalY = padTop + chartH - (goalHours / maxVal) * chartH;

  let bars = '';
  days.forEach((day, i) => {
    const v = values[i];
    const x = padLeft + i * (barW + gap);
    const label = new Date(day + 'T12:00:00').toLocaleDateString('ca-ES', { weekday: 'short' }).replace('.', '');
    if (v === null) {
      const barH = 4;
      const y = padTop + chartH - barH;
      bars += `<rect class="bar empty-bar" x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3"></rect>`;
    } else {
      const barH = Math.max(3, (v / maxVal) * chartH);
      const y = padTop + chartH - barH;
      bars += `<rect class="bar" x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3"></rect>`;
      bars += `<text class="value-label" x="${x + barW / 2}" y="${y - 4}" text-anchor="middle">${v.toFixed(1)}</text>`;
    }
    bars += `<text class="axis-label" x="${x + barW / 2}" y="${h - 2}" text-anchor="middle">${label}</text>`;
  });

  return `
    <svg class="fasting-chart-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <line class="goal-line" x1="${padLeft}" y1="${goalY}" x2="${w - padRight}" y2="${goalY}"></line>
      <text class="goal-label" x="${w - padRight}" y="${goalY - 3}" text-anchor="end">objectiu 12h</text>
      ${bars}
    </svg>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function showApp(user) {
  loginView.classList.add('hidden');
  appView.classList.remove('hidden');
  document.getElementById('user-email').textContent = user.email;
  setMealFieldsToNow();
  loadEntries();
  loadStats();
  loadFasting();
}

function showLogin() {
  appView.classList.add('hidden');
  loginView.classList.remove('hidden');
}

sb.auth.onAuthStateChange((_event, session) => {
  if (session && session.user) {
    showApp(session.user);
  } else {
    showLogin();
  }
});

sb.auth.getSession().then(({ data: { session } }) => {
  if (session && session.user) showApp(session.user);
  else showLogin();
});
</script>
</body>
</html>
